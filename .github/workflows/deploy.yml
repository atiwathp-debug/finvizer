name: Deploy to GitHub Pages

# Builds and deploys the Vite app to GitHub Pages via a gh-pages branch on
# every push to main, and on manual trigger. Requires Settings > Pages >
# Build and deployment > Source = "Deploy from a branch", branch =
# "gh-pages", folder = "/ (root)" in this repository (one-time setup, see
# docs/supabase-setup.md / README "Deploying to GitHub Pages").
#
# Uses peaceiris/actions-gh-pages instead of the official
# actions/configure-pages + upload-pages-artifact + deploy-pages pipeline,
# which was intermittently failing with "Deployment failed, try again
# later." at the deploy-pages step. This pushes the built dist/ folder
# directly to the gh-pages branch instead, which GitHub Pages then serves
# as a static branch source — a different, simpler deployment path that
# doesn't depend on the Pages deployments API.
#
# VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY are optional repository
# secrets — if unset, the deployed build runs in Mock Mode (the app is
# designed to work fully that way; see src/lib/supabase/client.ts).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Only one deployment at a time; a new push cancels any in-progress run
# rather than queuing behind it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      - name: Build (base path = /finvizer/, matching this GitHub Pages project site)
        env:
          VITE_BASE_PATH: /finvizer/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy dist/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          # GITHUB_TOKEN is an ephemeral token GitHub Actions injects
          # automatically for every run — not a secret you need to create.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
